services:
  - type: web
    name: Carto-facileSN
    runtime: python
    buildCommand: pip install -r backend/requirements-render.txt && bash backend/build.sh
    startCommand: cd backend && gunicorn "app:create_app()" --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
