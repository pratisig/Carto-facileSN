# Configuration Render - déploiement automatique depuis GitHub
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: cartofacile-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn app:create_app() --workers 2 --timeout 120"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cartofacile-db
          property: connectionString
      - key: WAVE_API_KEY
        value: ""
      - key: WAVE_SECRET
        value: ""
    healthCheckPath: /api/communes/regions
    plan: free

databases:
  - name: cartofacile-db
    databaseName: cartofacile
    user: cartofacile
    plan: free
